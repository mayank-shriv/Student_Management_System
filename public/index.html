<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Student Management System — Secure login for Faculty and Students">
  <title>Login — Student Management System</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to your account to continue</p>

      <div id="alert-box" class="hidden" style="padding:0.75rem 1rem; border-radius:var(--radius-md); margin-bottom:1rem; font-size:0.85rem;"></div>

      <form id="login-form" autocomplete="on">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          Sign In
        </button>
      </form>

      <!-- Google Sign-In Divider -->
      <div class="auth-divider">
        <span>or</span>
      </div>

      <!-- Google Sign-In Button -->
      <div id="google-signin-btn" class="google-btn-wrapper"></div>

      <p class="text-center mt-2" style="font-size:0.85rem;">
        <a href="/forgot-password" class="link-muted">Forgot your password?</a>
      </p>

      <p class="text-center mt-1" style="font-size:0.85rem; color:var(--text-secondary);">
        Don't have an account? <a href="/register">Create one</a>
      </p>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
