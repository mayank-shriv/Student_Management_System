<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Student Management System — Reset your password">
  <title>Forgot Password — Student Management System</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <!-- Step 1: Enter Email -->
      <div id="step-email">
        <div class="back-link mb-2">
          <a href="/login" id="back-to-login">← Back to Login</a>
        </div>

        <h1>Forgot Password?</h1>
        <p class="subtitle">Enter your email address and we'll send a reset link to your inbox.</p>

        <div id="alert-box" class="hidden" style="padding:0.75rem 1rem; border-radius:var(--radius-md); margin-bottom:1rem; font-size:0.85rem;"></div>

        <form id="forgot-password-form" autocomplete="on">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="forgot-btn">
            Send Reset Link
          </button>
        </form>
      </div>

      <!-- Step 2: Success - Show Token -->
      <div id="step-success" class="hidden">
        <div class="success-icon-container text-center mb-2">
          <div class="success-icon">✓</div>
        </div>

        <h1 class="text-center">Check Your Inbox</h1>
        <p class="subtitle text-center" id="success-subtitle">If an account with that email exists, we've sent a password reset link to your inbox.</p>

        <div id="token-display" class="token-display hidden">
          <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem;">Your Reset Token:</p>
          <div class="token-box">
            <code id="reset-token-value"></code>
            <button type="button" class="btn btn-sm btn-secondary" id="copy-token-btn" title="Copy token">📋</button>
          </div>
        </div>

        <a href="#" id="reset-link" class="btn btn-primary btn-block mt-2">
          Continue to Reset Password
        </a>

        <p class="text-center mt-2" style="font-size: 0.8rem; color: var(--text-muted);">
          Token expires in 1 hour
        </p>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <style>
    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      color: white;
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scaleIn {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .token-display {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 1rem;
      margin-top: 1rem;
    }

    .token-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .token-box code {
      flex: 1;
      font-size: 0.7rem;
      color: var(--accent-secondary);
      word-break: break-all;
      line-height: 1.5;
      font-family: 'Courier New', monospace;
    }

    .back-link a {
      font-size: 0.85rem;
      color: var(--text-secondary);
      transition: color var(--transition);
    }

    .back-link a:hover {
      color: var(--accent-secondary);
    }
  </style>

  <script src="/js/common.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/forgot-password.js"></script>
</body>
</html>
